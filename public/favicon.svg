<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Smooth Emerald/Teal Gradient Background -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="128" fill="url(#grad)" />
  
  <!-- Trash Can Body in Crisp White/Light gray -->
  <path d="M160 170 H352 V416 C352 432 338 446 322 446 H190 C174 446 160 432 160 416 Z" fill="#e2e8f0" />
  
  <!-- Trash Can Details / Verticals -->
  <rect x="195" y="210" width="16" height="190" rx="8" fill="#cbd5e1" />
  <rect x="248" y="210" width="16" height="190" rx="8" fill="#cbd5e1" />
  <rect x="301" y="210" width="16" height="190" rx="8" fill="#cbd5e1" />
  
  <!-- Trash Can Rim -->
  <rect x="140" y="140" width="232" height="30" rx="15" fill="#f1f5f9" />
  
  <!-- Trash Can Lid (Open/Shifted to show leaf) -->
  <path d="M180 120 C180 90 332 90 332 120" fill="none" stroke="#f1f5f9" stroke-width="20" stroke-linecap="round" />
  
  <!-- Beautiful Glowing Leaf coming out of the trashcan -->
  <path d="M256 220 C256 120 360 80 370 140 C320 220 256 220 256 220" fill="url(#leafGrad)" />
  <path d="M370 140 C280 150 260 210 256 220" fill="none" stroke="#047857" stroke-width="6" stroke-linecap="round" />
  
  <!-- Subtle Leaf reflection/details -->
  <path d="M256 220 C290 190 340 170 370 140" fill="none" stroke="#6ee7b7" stroke-width="4" stroke-linecap="round" opacity="0.6" />
</svg>
